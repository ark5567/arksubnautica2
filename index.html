<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ark — Subnautica 2 Profile</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Exo+2:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>

/* =============================================
   HOW TO CUSTOMIZE:
   - background.gif / background.png  → your background file
   - avatar.png / avatar.gif          → your avatar file
   - ambient.mp3 / ambient.mp4        → your audio file
   - Edit username, bio, status, links in the HTML below
   ============================================= */

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── CUSTOM CURSOR ── */
html { cursor: none; }

/* Hide default on interactive elements too */
a, button, input[type=range] { cursor: none; }

/* Cursor elements are injected by JS */
#cursor-dot {
  position: fixed;
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #00e5ff;
  box-shadow: 0 0 8px #00e5ff, 0 0 16px rgba(0,229,255,0.4);
  pointer-events: none;
  z-index: 99999;
  transform: translate(-50%, -50%);
  transition: width 0.15s, height 0.15s, background 0.15s, box-shadow 0.15s;
  mix-blend-mode: screen;
}

#cursor-ring {
  position: fixed;
  width: 32px; height: 32px;
  border-radius: 50%;
  border: 1.2px solid rgba(0,229,255,0.55);
  pointer-events: none;
  z-index: 99998;
  transform: translate(-50%, -50%);
  transition: width 0.22s cubic-bezier(0.22,1,0.36,1),
              height 0.22s cubic-bezier(0.22,1,0.36,1),
              border-color 0.22s,
              left 0.05s linear,
              top 0.05s linear;
}

/* Crosshair lines on the ring */
#cursor-ring::before,
#cursor-ring::after {
  content: '';
  position: absolute;
  background: rgba(0,229,255,0.35);
  border-radius: 1px;
  top: 50%; left: 50%;
}
#cursor-ring::before {
  width: 1px; height: 8px;
  transform: translate(-50%, -50%) scaleY(1);
  transition: transform 0.2s;
}
#cursor-ring::after {
  width: 8px; height: 1px;
  transform: translate(-50%, -50%) scaleX(1);
  transition: transform 0.2s;
}

/* Hover state – ring expands and glows green */
body.cursor-hover #cursor-ring {
  width: 44px; height: 44px;
  border-color: rgba(57,255,138,0.7);
  box-shadow: 0 0 12px rgba(57,255,138,0.18);
}
body.cursor-hover #cursor-dot {
  width: 5px; height: 5px;
  background: #39ff8a;
  box-shadow: 0 0 8px #39ff8a;
}

:root {
  --cyan:   #00e5ff;
  --teal:   #00b4c8;
  --green:  #39ff8a;
  --purple: #8b5cf6;
  --orange: #ff6b35;
  --deep:   #020f1a;
  --mid:    #041e33;
  --text:   #e0f7ff;
  --muted:  #7ab8cc;
  --glass:  rgba(4, 30, 51, 0.84);
  --border: rgba(0, 229, 255, 0.22);
}

body {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  font-family: 'Exo 2', sans-serif;
  background: #020f1a;
  position: relative;
  perspective: 1200px;
}

/* ── BACKGROUND ── */
.bg { position: fixed; inset: 0; z-index: 0; overflow: hidden; }

.bg-image {
  position: absolute; inset: 0;
  background-image: url('background.png');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}

.bg-overlay {
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse at 20% 30%, rgba(0,180,200,0.12) 0%, transparent 55%),
    radial-gradient(ellipse at 80% 70%, rgba(57,255,138,0.07) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 50%, rgba(2,15,26,0.45) 0%, rgba(2,15,26,0.2) 100%);
}

/* Mouse-follow ambient light blob */
.cursor-light {
  position: fixed;
  width: 340px; height: 340px;
  border-radius: 50%;
  pointer-events: none;
  z-index: 2;
  background: radial-gradient(circle, rgba(0,229,255,0.06) 0%, transparent 70%);
  transform: translate(-50%, -50%);
  transition: left 0.06s linear, top 0.06s linear;
}

.particles { position: absolute; inset: 0; pointer-events: none; }
.particle {
  position: absolute; border-radius: 50%; opacity: 0;
  animation: float-up var(--dur,8s) var(--delay,0s) ease-in infinite;
}
@keyframes float-up {
  0%   { opacity: 0; transform: translateY(0) scale(1); }
  10%  { opacity: var(--op,0.4); }
  90%  { opacity: var(--op,0.4); }
  100% { opacity: 0; transform: translateY(-100vh) scale(0.3); }
}

.scanline {
  position: fixed; inset: 0; z-index: 1; pointer-events: none;
  background: repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,229,255,0.011) 2px,rgba(0,229,255,0.011) 4px);
}

/* ── CARD ── */
.card {
  position: relative; z-index: 10;
  width: 410px; max-width: calc(100vw - 32px);
  background: var(--glass);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 32px 28px 24px;
  backdrop-filter: blur(22px);
  -webkit-backdrop-filter: blur(22px);
  box-shadow:
    0 0 60px rgba(0,229,255,0.07),
    0 0 120px rgba(0,229,255,0.04),
    inset 0 1px 0 rgba(255,255,255,0.06),
    inset 0 -1px 0 rgba(0,0,0,0.3);
  animation: card-in 0.9s cubic-bezier(0.22,1,0.36,1) both;
  transform-style: preserve-3d;
  will-change: transform;
  transition: box-shadow 0.3s ease;
}
@keyframes card-in {
  from { opacity: 0; transform: translateY(30px) scale(0.96); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

.card::before {
  content: ''; position: absolute;
  top: -1px; left: 32px; right: 32px; height: 2px;
  background: linear-gradient(90deg,transparent,var(--cyan),var(--green),var(--cyan),transparent);
  border-radius: 2px;
  animation: shimmer 4s ease-in-out infinite;
}
@keyframes shimmer { 0%,100%{opacity:0.7} 50%{opacity:1} }

.card::after {
  content: ''; position: absolute;
  top: 12px; right: 12px; width: 16px; height: 16px;
  border-top: 1.5px solid rgba(0,229,255,0.5);
  border-right: 1.5px solid rgba(0,229,255,0.5);
  border-radius: 0 4px 0 0; pointer-events: none;
  transition: border-color 0.35s, filter 0.35s;
}
.card:hover::after { border-color: rgba(0,229,255,0.95); filter: drop-shadow(0 0 4px var(--cyan)); }

.corner-bl {
  position: absolute; bottom: 12px; left: 12px; width: 16px; height: 16px;
  border-bottom: 1.5px solid rgba(0,229,255,0.5);
  border-left: 1.5px solid rgba(0,229,255,0.5);
  border-radius: 0 0 0 4px; pointer-events: none;
  transition: border-color 0.35s, filter 0.35s;
}
.card:hover .corner-bl { border-color: rgba(0,229,255,0.95); filter: drop-shadow(0 0 4px var(--cyan)); }

.card:hover {
  box-shadow:
    0 0 90px rgba(0,229,255,0.14),
    0 0 180px rgba(0,229,255,0.07),
    inset 0 1px 0 rgba(255,255,255,0.09),
    inset 0 -1px 0 rgba(0,0,0,0.3);
}

/* Shine overlay that follows mouse */
.card-shine {
  position: absolute; inset: 0; border-radius: 24px;
  pointer-events: none; z-index: 0; overflow: hidden;
}
.card-shine::after {
  content: ''; position: absolute; inset: 0; border-radius: 24px;
  background: radial-gradient(circle at var(--mx,50%) var(--my,50%), rgba(0,229,255,0.09) 0%, transparent 55%);
  opacity: 0; transition: opacity 0.35s;
}
.card:hover .card-shine::after { opacity: 1; }

/* ── HEADER ── */
.header { display: flex; align-items: center; gap: 18px; margin-bottom: 20px; position: relative; z-index: 1; }

.avatar-wrap { position: relative; flex-shrink: 0; }

.avatar-ring {
  position: absolute; inset: -5px; border-radius: 50%; padding: 2px;
  background: conic-gradient(var(--cyan) 0%,var(--green) 33%,var(--purple) 66%,var(--cyan) 100%);
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor; mask-composite: exclude;
  animation: ring-spin 8s linear infinite; pointer-events: none;
  transition: filter 0.35s;
}
.avatar-wrap:hover .avatar-ring { filter: brightness(1.5) drop-shadow(0 0 10px var(--cyan)); }
@keyframes ring-spin { to { transform: rotate(360deg); } }

.avatar {
  width: 80px; height: 80px; border-radius: 50%; overflow: hidden;
  background: var(--mid); border: 2px solid rgba(0,229,255,0.3);
  box-shadow: 0 0 24px rgba(0,229,255,0.3), inset 0 0 20px rgba(0,0,0,0.5);
  display: flex; align-items: center; justify-content: center; font-size: 36px;
  transition: box-shadow 0.35s cubic-bezier(0.22,1,0.36,1), transform 0.35s cubic-bezier(0.22,1,0.36,1);
}
.avatar-wrap:hover .avatar {
  box-shadow: 0 0 44px rgba(0,229,255,0.6), 0 0 90px rgba(0,229,255,0.22), inset 0 0 20px rgba(0,0,0,0.5);
  transform: scale(1.07);
}
.avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }

.name-block { flex: 1; min-width: 0; }

.username {
  font-family: 'Orbitron', monospace; font-size: 20px; font-weight: 700;
  color: var(--text); letter-spacing: 0.04em; line-height: 1.2; word-break: break-word;
  animation: name-glow 3s ease-in-out infinite alternate;
  transition: letter-spacing 0.4s cubic-bezier(0.22,1,0.36,1);
}
.username:hover { letter-spacing: 0.1em; }
@keyframes name-glow {
  from { text-shadow: 0 0 16px rgba(0,229,255,0.4); }
  to   { text-shadow: 0 0 32px rgba(0,229,255,0.75), 0 0 64px rgba(0,229,255,0.2); }
}

.status-badge {
  display: inline-flex; align-items: center; gap: 6px; margin-top: 8px;
  background: rgba(0,229,255,0.07); border: 1px solid rgba(0,229,255,0.18);
  border-radius: 20px; padding: 3px 12px;
  font-size: 11.5px; font-weight: 500; color: var(--teal); letter-spacing: 0.06em;
  transition: background 0.3s, border-color 0.3s, color 0.3s, transform 0.3s;
}
.status-badge:hover { background: rgba(0,229,255,0.14); border-color: rgba(0,229,255,0.45); color: var(--cyan); transform: translateX(3px); }

.status-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--green); box-shadow: 0 0 6px var(--green);
  animation: dot-pulse 2s ease-in-out infinite;
}
@keyframes dot-pulse {
  0%,100% { box-shadow: 0 0 4px var(--green); opacity: 1; }
  50%      { box-shadow: 0 0 12px var(--green), 0 0 24px rgba(57,255,138,0.3); opacity: 0.7; }
}

/* ── DIVIDER ── */
.divider {
  height: 1px; position: relative; margin: 18px 0;
  background: linear-gradient(90deg,transparent,var(--border),rgba(57,255,138,0.15),var(--border),transparent);
}
.divider::after {
  content: '◆'; position: absolute; left: 50%; top: 50%;
  transform: translate(-50%,-50%); font-size: 7px; color: var(--cyan);
  background: rgba(4,30,51,0.9); padding: 0 6px; opacity: 0.6;
}

/* ── BIO ── */
.bio {
  font-size: 13.5px; font-style: italic; color: var(--muted);
  line-height: 1.7; font-weight: 300;
  border-left: 2px solid rgba(0,229,255,0.28); padding-left: 12px;
  margin-bottom: 20px; word-break: break-word;
  animation: fade-in 1.2s ease both; animation-delay: 0.3s;
  transition: border-color 0.35s, color 0.35s, padding-left 0.35s;
  position: relative; z-index: 1;
}
.bio:hover { border-color: rgba(0,229,255,0.7); color: #b8dded; padding-left: 16px; }
@keyframes fade-in {
  from { opacity: 0; transform: translateX(-8px); }
  to   { opacity: 1; transform: translateX(0); }
}

/* ── LINKS ── */
.links-label {
  font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
  color: rgba(122,184,204,0.45); margin-bottom: 10px; font-weight: 500;
  font-family: 'Orbitron', monospace; position: relative; z-index: 1;
}

.links {
  display: flex; flex-wrap: wrap; gap: 8px;
  animation: fade-in 1.4s ease both; animation-delay: 0.5s;
  position: relative; z-index: 1;
}

.link-btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 7px 14px;
  background: rgba(0,229,255,0.05);
  border: 1px solid rgba(0,229,255,0.18);
  border-radius: 10px;
  color: var(--teal); font-size: 12.5px;
  font-family: 'Exo 2', sans-serif; font-weight: 500;
  text-decoration: none; letter-spacing: 0.03em;
  transition: all 0.25s cubic-bezier(0.22,1,0.36,1);
  position: relative; overflow: hidden;
}
.link-btn::before {
  content: ''; position: absolute; inset: 0; border-radius: 10px;
  background: linear-gradient(135deg, rgba(0,229,255,0.13), rgba(57,255,138,0.07));
  opacity: 0; transition: opacity 0.25s;
}
.link-btn::after {
  content: ''; position: absolute;
  top: 0; left: -60%; width: 40%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.07), transparent);
  transform: skewX(-20deg);
  transition: left 0.45s ease;
}
.link-btn:hover {
  border-color: rgba(0,229,255,0.58);
  color: var(--cyan);
  transform: translateY(-3px) scale(1.04);
  box-shadow: 0 8px 28px rgba(0,229,255,0.16), 0 0 0 1px rgba(0,229,255,0.1), 0 0 24px rgba(0,229,255,0.07);
}
.link-btn:hover::before { opacity: 1; }
.link-btn:hover::after  { left: 130%; }
.link-btn:active        { transform: translateY(0) scale(0.97); }

.link-btn svg { flex-shrink: 0; transition: filter 0.25s, transform 0.3s cubic-bezier(0.22,1,0.36,1); }
.link-btn:hover svg { filter: drop-shadow(0 0 7px var(--cyan)); transform: scale(1.2) rotate(-6deg); }

/* ── AUDIO BAR ── */
.audio-bar {
  display: flex; align-items: center; gap: 10px;
  margin-top: 20px; padding-top: 16px;
  border-top: 1px solid rgba(0,229,255,0.1);
  position: relative; z-index: 1;
}

.mute-btn {
  display: flex; align-items: center; justify-content: center;
  width: 38px; height: 38px; border-radius: 50%;
  background: rgba(0,229,255,0.06);
  border: 1px solid rgba(0,229,255,0.22);
  color: var(--teal);
  transition: all 0.28s cubic-bezier(0.22,1,0.36,1);
  position: relative; overflow: hidden; flex-shrink: 0;
}
.mute-btn::before {
  content: ''; position: absolute; inset: 0; border-radius: 50%;
  background: radial-gradient(circle, rgba(0,229,255,0.2), transparent 70%);
  opacity: 0;
  transition: opacity 0.28s, transform 0.28s;
  transform: scale(0.5);
}
.mute-btn:hover { background: rgba(0,229,255,0.14); border-color: rgba(0,229,255,0.55); color: var(--cyan); transform: scale(1.14) rotate(8deg); box-shadow: 0 0 22px rgba(0,229,255,0.28); }
.mute-btn:hover::before { opacity: 1; transform: scale(1); }
.mute-btn:active { transform: scale(0.94); }
.mute-btn.muted { color: rgba(122,184,204,0.28); border-color: rgba(0,229,255,0.07); }
.mute-btn svg { position: relative; z-index: 1; transition: filter 0.28s; }
.mute-btn:hover svg { filter: drop-shadow(0 0 6px var(--cyan)); }

/* ── Mute icon — animated slash line ── */
/* The slash is a child line we animate in/out */
.mute-slash {
  position: absolute; z-index: 2; pointer-events: none;
  top: 50%; left: 50%;
  width: 22px; height: 1.5px;
  background: rgba(255,107,53,0.85);
  border-radius: 2px;
  box-shadow: 0 0 5px rgba(255,107,53,0.5);
  transform: translate(-50%, -50%) rotate(-45deg) scaleX(0);
  transform-origin: center;
  transition: transform 0.25s cubic-bezier(0.22,1,0.36,1), opacity 0.2s;
  opacity: 0;
}
.mute-btn.muted .mute-slash {
  transform: translate(-50%, -50%) rotate(-45deg) scaleX(1);
  opacity: 1;
}

.audio-label {
  flex: 1; font-size: 10.5px; color: rgba(122,184,204,0.45);
  letter-spacing: 0.1em; text-transform: uppercase; font-weight: 500;
  font-family: 'Orbitron', monospace;
}

.waveform { display: flex; align-items: center; gap: 2px; height: 20px; }
.wave-bar {
  width: 3px; background: var(--cyan); border-radius: 2px; opacity: 0.6;
  animation: wave var(--spd,0.8s) ease-in-out infinite alternate;
  animation-delay: var(--dl,0s);
}
@keyframes wave { from { height: 3px; } to { height: var(--h,14px); } }
.waveform.paused .wave-bar { animation-play-state: paused; height: 3px !important; opacity: 0.18; }

.vol-slider {
  -webkit-appearance: none; width: 78px; height: 3px;
  border-radius: 2px; background: rgba(0,229,255,0.15); outline: none; flex-shrink: 0;
  transition: background 0.2s;
}
.vol-slider:hover { background: rgba(0,229,255,0.3); }
.vol-slider::-webkit-slider-thumb {
  -webkit-appearance: none; width: 13px; height: 13px; border-radius: 50%;
  background: var(--cyan); box-shadow: 0 0 8px var(--cyan);
  transition: transform 0.18s, box-shadow 0.18s;
}
.vol-slider:hover::-webkit-slider-thumb { transform: scale(1.25); box-shadow: 0 0 16px var(--cyan); }
.vol-slider::-moz-range-thumb {
  width: 13px; height: 13px; border-radius: 50%;
  background: var(--cyan); border: none;
}

/* ── DECO BUBBLES ── */
.deco-bubble {
  position: absolute; border-radius: 50%; pointer-events: none;
  border: 1px solid rgba(0,229,255,0.2);
  background: radial-gradient(circle at 35% 35%, rgba(0,229,255,0.14), rgba(0,40,70,0.04));
  animation: bob var(--dur,6s) ease-in-out infinite alternate;
  animation-delay: var(--dl,0s);
}
@keyframes bob { from{transform:translateY(0) rotate(0deg)} to{transform:translateY(-8px) rotate(5deg)} }

/* ── CLICK RIPPLE — only on buttons/links ── */
.ripple-ring {
  position: fixed; pointer-events: none; z-index: 9999;
  border-radius: 50%; border: 1.5px solid rgba(0,229,255,0.65);
  transform: translate(-50%,-50%) scale(0);
  animation: ripple-out 0.6s ease-out forwards;
}
@keyframes ripple-out { to { transform: translate(-50%,-50%) scale(4); opacity: 0; } }

</style>
</head>
<body>

<!-- Custom cursor elements -->
<div id="cursor-dot"></div>
<div id="cursor-ring"></div>

<div class="bg">
  <!-- Replace background.gif with your file -->
  <div class="bg-image"></div>
  <div class="bg-overlay"></div>
  <div class="particles" id="particles"></div>
</div>
<div class="cursor-light" id="cursor-light"></div>
<div class="scanline"></div>

<!-- Replace ambient.mp3 with your audio file -->
<audio id="bg-audio" loop preload="auto">
  <source src="ambient.mp3" type="audio/mpeg">
  <source src="ambient.mp4" type="video/mp4">
</audio>

<!-- ══════════════ PROFILE CARD ══════════════ -->
<div class="card" id="card">
  <div class="card-shine" id="card-shine"></div>
  <div class="corner-bl"></div>
  <div class="deco-bubble" style="width:10px;height:10px;top:14px;right:44px;--dur:5s;--dl:0s;"></div>
  <div class="deco-bubble" style="width:6px;height:6px;top:26px;right:64px;--dur:7s;--dl:1.2s;"></div>
  <div class="deco-bubble" style="width:13px;height:13px;bottom:52px;left:18px;--dur:9s;--dl:0.5s;opacity:0.5;"></div>

  <!-- HEADER -->
  <div class="header">
    <div class="avatar-wrap">
      <div class="avatar-ring"></div>
      <div class="avatar">
        <!-- ↓ EDIT: Replace avatar.png with your image -->
        <img src="avatar.png" alt="Avatar"
             onerror="this.style.display='none';this.parentElement.querySelector('.avatar-fallback').style.display='flex'">
        <span class="avatar-fallback" style="display:none;font-size:36px;">🦑</span>
      </div>
    </div>
    <div class="name-block">
      <!-- ↓ EDIT: Your username -->
      <div class="username">Ark</div>
      <div class="status-badge">
        <div class="status-dot" id="status-dot"></div>
        <!-- Status text is set by status.json -->
        <span id="status-text">Online · 847m depth</span>
      </div>
    </div>
  </div>

  <div class="divider"></div>

  <!-- ↓ EDIT: Your bio / tagline -->
  <div class="bio">"True Subnautician."</div>

  <!-- LINKS -->
  <div class="links-label">Transponder Signals</div>
  <div class="links">

    <!-- Twitch — leviathan fin icon -->
    <a class="link-btn" href="https://www.twitch.tv/ark5567" target="_blank" rel="noopener">
      <svg width="17" height="17" viewBox="0 0 17 17" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M2 14.5 C3 10 5.5 6.5 8.5 2.5 C11.5 6.5 14 10 15 14.5" stroke="#00e5ff" stroke-width="1.3" fill="rgba(0,229,255,0.09)" stroke-linejoin="round" stroke-linecap="round"/>
        <path d="M5 14.5 C6 11 7.5 8.5 8.5 6.5 C9.5 8.5 11 11 12 14.5" stroke="#39ff8a" stroke-width="1" fill="rgba(57,255,138,0.08)" stroke-linejoin="round" stroke-linecap="round"/>
        <circle cx="8.5" cy="4.5" r="1" fill="#00e5ff" opacity="0.9"/>
        <line x1="2" y1="14.5" x2="15" y2="14.5" stroke="#00e5ff" stroke-width="0.8" opacity="0.35"/>
      </svg>
      Twitch

<script>
/* ── PARTICLES ── */
(function(){
  const c = document.getElementById('particles');
  const cols = ['rgba(0,229,255,','rgba(57,255,138,','rgba(139,92,246,'];
  for(let i=0;i<30;i++){
    const p = document.createElement('div'); p.className = 'particle';
    const s = 2+Math.random()*4;
    const col = cols[Math.floor(Math.random()*cols.length)];
    const op = (0.1+Math.random()*0.35).toFixed(2);
    Object.assign(p.style,{
      width:s+'px', height:s+'px',
      left:Math.random()*100+'%', top:Math.random()*100+'%',
      background:col+op+')', boxShadow:`0 0 ${s*2}px ${col}0.6)`,
      '--dur':(6+Math.random()*14)+'s', '--delay':(Math.random()*12)+'s', '--op':op
    });
    c.appendChild(p);
  }
})();

/* ── CUSTOM CURSOR ── */
const cursorDot  = document.getElementById('cursor-dot');
const cursorRing = document.getElementById('cursor-ring');

let mouseX = -100, mouseY = -100;
let ringX  = -100, ringY  = -100;

document.addEventListener('mousemove', e => {
  mouseX = e.clientX; mouseY = e.clientY;
  cursorDot.style.left  = mouseX + 'px';
  cursorDot.style.top   = mouseY + 'px';
});

// Ring follows with slight lag
(function ringLoop(){
  ringX += (mouseX - ringX) * 0.14;
  ringY += (mouseY - ringY) * 0.14;
  cursorRing.style.left = ringX + 'px';
  cursorRing.style.top  = ringY + 'px';
  requestAnimationFrame(ringLoop);
})();

// Hover state on interactive elements
const interactives = 'a, button, input[type=range]';
document.querySelectorAll(interactives).forEach(el => {
  el.addEventListener('mouseenter', () => document.body.classList.add('cursor-hover'));
  el.addEventListener('mouseleave', () => document.body.classList.remove('cursor-hover'));
});

/* ── CURSOR LIGHT ── */
const cursorLight = document.getElementById('cursor-light');
document.addEventListener('mousemove', e => {
  cursorLight.style.left = e.clientX + 'px';
  cursorLight.style.top  = e.clientY + 'px';
});

/* ── CLICK RIPPLE — only on buttons and links ── */
function spawnRipple(x, y) {
  const r = document.createElement('div');
  r.className = 'ripple-ring';
  const sz = 28 + Math.random()*18;
  Object.assign(r.style, { width:sz+'px', height:sz+'px', left:x+'px', top:y+'px' });
  document.body.appendChild(r);
  r.addEventListener('animationend', () => r.remove());
}

document.querySelectorAll('a, button').forEach(el => {
  el.addEventListener('click', e => spawnRipple(e.clientX, e.clientY));
});

/* ── 3D CARD TILT ── */
const card  = document.getElementById('card');
const shine = document.getElementById('card-shine');
let targetRX = 0, targetRY = 0;
let currentRX = 0, currentRY = 0;

card.addEventListener('mousemove', e => {
  const rect = card.getBoundingClientRect();
  const dx = (e.clientX - (rect.left + rect.width  / 2)) / (rect.width  / 2);
  const dy = (e.clientY - (rect.top  + rect.height / 2)) / (rect.height / 2);
  targetRY =  dx * 12;
  targetRX = -dy * 8;
  const mx = ((e.clientX - rect.left) / rect.width  * 100).toFixed(1);
  const my = ((e.clientY - rect.top)  / rect.height * 100).toFixed(1);
  shine.style.setProperty('--mx', mx + '%');
  shine.style.setProperty('--my', my + '%');
});

card.addEventListener('mouseleave', () => { targetRX = 0; targetRY = 0; });

(function tiltLoop(){
  const ease = 0.07;
  currentRX += (targetRX - currentRX) * ease;
  currentRY += (targetRY - currentRY) * ease;
  card.style.transform = `perspective(900px) rotateX(${currentRX.toFixed(3)}deg) rotateY(${currentRY.toFixed(3)}deg)`;
  requestAnimationFrame(tiltLoop);
})();

/* ── AUDIO ── */
const audio    = document.getElementById('bg-audio');
const muteBtn  = document.getElementById('mute-btn');
const lbl      = document.getElementById('audio-label');
const waveform = document.getElementById('waveform');
const volSlider= document.getElementById('vol-slider');

audio.volume = 0.4;
let playing = false;

function setPlaying(state) {
  playing = state;
  // Toggle muted class — CSS handles the slash animation
  muteBtn.classList.toggle('muted', !state);
  lbl.textContent = state ? 'Ambient · Playing' : 'Ambient · Muted';
  waveform.classList.toggle('paused', !state);
}

function startAudio(){
  audio.play()
    .then(() => setPlaying(true))
    .catch(() => { lbl.textContent = 'Ambient · No file found'; });
}
function stopAudio(){ audio.pause(); setPlaying(false); }

muteBtn.addEventListener('click', e => {
  e.stopPropagation();
  playing ? stopAudio() : startAudio();
});

volSlider.addEventListener('input', () => {
  const v = volSlider.value / 100;
  audio.volume = v;
  if(v > 0 && !playing) startAudio();
  if(v === 0 && playing) stopAudio();
});

/* Start on first interaction (browser autoplay policy) */
const autoStart = () => {
  if(!playing) startAudio();
  document.removeEventListener('click',   autoStart);
  document.removeEventListener('keydown', autoStart);
};
document.addEventListener('click',   autoStart);
document.addEventListener('keydown', autoStart);

audio.addEventListener('error', () => {
  lbl.textContent = 'Ambient · No file found';
  waveform.classList.add('paused');
});

/* ── STATUS.JSON ── */
const statusDot  = document.getElementById('status-dot');
const statusText = document.getElementById('status-text');

// Idle: slow half-opacity pulse instead of full bright pulse
const idleKeyframes = `
@keyframes dot-idle {
  0%,100% { opacity: 1;   box-shadow: 0 0 4px var(--status-color); }
  50%      { opacity: 0.3; box-shadow: 0 0 4px var(--status-color); }
}`;
const idleStyle = document.createElement('style');
idleStyle.textContent = idleKeyframes;
document.head.appendChild(idleStyle);

function applyStatus(data) {
  const color = data.color || '#39ff8a';
  statusText.textContent = data.text || 'Online';
  statusDot.style.setProperty('--status-color', color);
  statusDot.style.background   = color;
  statusDot.style.boxShadow    = `0 0 6px ${color}`;

  // Swap animation based on label
  const label = (data.label || '').toLowerCase();
  if (label === 'offline') {
    statusDot.style.animation = 'none';
    statusDot.style.opacity   = '0.35';
  } else if (label === 'idle') {
    statusDot.style.animation = 'dot-idle 2.4s ease-in-out infinite';
    statusDot.style.opacity   = '1';
  } else {
    // Online / Do Not Disturb — normal pulse
    statusDot.style.animation = 'dot-pulse 2s ease-in-out infinite';
    statusDot.style.opacity   = '1';
  }
}

async function fetchStatus() {
  try {
    // Cache-bust so GitHub Pages always serves the latest version
    const res = await fetch('status.json?t=' + Date.now());
    if (!res.ok) return;
    const data = await res.json();
    applyStatus(data);
  } catch (e) {
    // No status.json found — silently keep defaults
  }
}

fetchStatus();
setInterval(fetchStatus, 30000); // re-check every 30 seconds
</script>
